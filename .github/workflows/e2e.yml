name: e2e

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 1. Контракт: установить зависимости и сгенерировать openapi.yaml.
      - name: Install root deps (contract)
        run: npm ci
      - name: Compile TypeSpec -> openapi.yaml
        run: npm run compile

      # 2. Бэкенд (реальный stateful API для E2E).
      - name: Install backend deps
        run: npm ci
        working-directory: backend

      # 3. Фронтенд: зависимости + типы API из свежего контракта.
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Generate API types
        run: npm run gen:api
        working-directory: frontend

      # 4. Браузеры Playwright.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      # 5. Прогон E2E (Playwright сам поднимает backend + frontend).
      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
